name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - devops-assignment-branch
  pull_request:
    branches:
      - main
      - develop
      - devops-assignment-branch
env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/rate-limiter

jobs:
  # 1. Test Suite execution
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Run Maven Tests
        run: |
          if [ -f "./mvnw" ]; then
            ./mvnw clean test
          else
            mvn clean test
          fi

  # 2. Containerize & Push Docker Image
  build-and-push:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' # Only push images on merges/commits, not pull requests
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Branch Name and Set Tags
        id: meta
        run: |
          BRANCH=${GITHUB_REF#refs/heads/}
          SHA_TAG=${GITHUB_SHA::7}
          if [ "$BRANCH" = "main" ]; then
            echo "tags=$DOCKER_IMAGE:latest,$DOCKER_IMAGE:$SHA_TAG" >> $GITHUB_OUTPUT
          else
            echo "tags=$DOCKER_IMAGE:staging,$DOCKER_IMAGE:$SHA_TAG" >> $GITHUB_OUTPUT
          fi

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # 3. Deploy Staging & Production
  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Log in to AWS using Repository Secrets
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::779323586929:role/TerraformDeploymentRole
          role-duration-seconds: 1200
          role-skip-session-tagging: true
      # Query AWS to find the public IP of the active EC2 instance dynamically
      - name: Get EC2 Public IP Dynamically
        run: |
          EC2_IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=rate-limiter-app-server" "Name=instance-state-name,Values=running" \
            --query "Reservations[*].Instances[*].PublicIpAddress" \
            --output text)
          if [ -z "$EC2_IP" ] || [ "$EC2_IP" = "None" ]; then
            echo "Error: No running EC2 instance found with tag Name=rate-limiter-app-server!"
            exit 1
          fi
          echo "EC2_HOST=$EC2_IP" >> $GITHUB_ENV

      - name: Configure SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: unnecessary # Handled via StrictHostKeyChecking=no
          if_key_exists: replace

      - name: Deploy Container via SSH
        run: |
          # Detect image tag based on branch
          BRANCH=${GITHUB_REF#refs/heads/}
          if [ "$BRANCH" = "main" ]; then
            IMAGE_TAG="latest"
          else
            IMAGE_TAG="staging"
          fi
          
          ssh -o StrictHostKeyChecking=no ubuntu@${{ env.EC2_HOST }} << EOF
            
            echo "${{ secrets.DOCKER_PASSWORD }}" | sudo docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            # Pull the new image version from Docker Hub
            sudo docker pull ${{ env.DOCKER_IMAGE }}:${IMAGE_TAG}
            
            # Stop and remove the old running container
            sudo docker stop rate-limiter || true
            sudo docker rm rate-limiter || true
            
            # Filter out host PATH variable to prevent overriding the container's Java Path
            grep -v '^PATH=' /etc/environment > /tmp/env.list

            # Run the new container using the filtered env file
            sudo docker run -d \
              --name rate-limiter \
              -p 8080:8080 \
              --restart always \
              --env-file /tmp/env.list \
              ${{ env.DOCKER_IMAGE }}:${IMAGE_TAG}
              
            # Prune obsolete dangling images
            sudo docker image prune -f
          EOF


