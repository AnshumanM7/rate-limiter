spring.datasource.url=jdbc:h2:mem:ratelimiter_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Keep rate limiter properties configured for default values
rate-limiter.enabled=true
rate-limiter.strategy=fixed-window
rate-limiter.max-requests=10
rate-limiter.window-seconds=60
rate-limiter.leaky-capacity=5
rate-limiter.leaky-rate=1
